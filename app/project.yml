name: PlaiY
options:
  bundleIdPrefix: com.plaiy
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  PlaiY:
    type: application
    platform: macOS
    sources:
      - path: Shared
        type: group
      - path: macOS
        type: group
      - path: ../core/platform/apple/metal_shaders.metal
        type: file
        buildPhase: sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.plaiy.app
        PRODUCT_NAME: PlaiY
        INFOPLIST_FILE: macOS/Info.plist
        SWIFT_OBJC_BRIDGING_HEADER: BridgingHeader.h
        HEADER_SEARCH_PATHS:
          - $(PROJECT_DIR)/../core/include
          - /opt/homebrew/include
        LIBRARY_SEARCH_PATHS:
          - $(PROJECT_DIR)/../build/apple-debug/core
          - $(PROJECT_DIR)/../build/apple-release/core
          - /opt/homebrew/lib
        OTHER_LDFLAGS:
          - -lc++
          - -lplaiy_core
          - -lavformat
          - -lavcodec
          - -lavutil
          - -lswresample
          - -lswscale
          - -lavfilter
          - -lass
          - -lfreetype
          - -lharfbuzz
          - -lfribidi
          - -lfontconfig
          - -lz
          - -lbz2
          - -liconv
          - -llzma
          - -lxml2
          - -framework VideoToolbox
          - -framework CoreMedia
          - -framework CoreVideo
          - -framework CoreFoundation
          - -framework CoreAudio
          - -framework AudioToolbox
          - -framework Metal
          - -framework MetalKit
          - -framework QuartzCore
          - -framework IOSurface
          - -framework MediaPlayer
          - -framework Security
          - -framework AVFoundation
          - -framework CoreMotion
        ENABLE_HARDENED_RUNTIME: NO
        CODE_SIGN_IDENTITY: "-"
